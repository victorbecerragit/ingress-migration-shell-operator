# kind-test.yaml
# Features a dummy deployment, service, and NGINX Ingress to test the operator safely.
# NOTE: The migration hook's `namespace-selector` matches NAMESPACE labels.
#       This example creates a dedicated namespace labeled `env=prod`.
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-prod
  labels:
    env: prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-prod
  labels:
    env: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: echoserver
        image: gcr.io/google-containers/echoserver:1.10
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo-prod
  labels:
    env: prod
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: demo-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: demo-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
  labels:
    env: prod
spec:
  rules:
  - host: demo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-app
            port:
              number: 80
