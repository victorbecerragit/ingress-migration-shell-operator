# Mock cluster state for e2e tests
# - Creates a namespace labeled env=prod so the operator's namespace-selector can match it.
# - Includes a minimal Service + Deployment + Ingress that ingress2gateway can convert.
---
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-migration-mock
  labels:
    env: prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: ingress-migration-mock
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: echoserver
          image: gcr.io/google-containers/echoserver:1.10
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: ingress-migration-mock
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: ingress-migration-mock
spec:
  ingressClassName: nginx
  rules:
    - host: demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress-apisix
  namespace: ingress-migration-mock
spec:
  ingressClassName: apisix
  rules:
    - host: demo-apisix.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress-kgateway
  namespace: ingress-migration-mock
spec:
  # kgateway-dev is a Gateway API controller; for this e2e case we keep the Ingress
  # provider as nginx and override the output gatewayClassName to "kgateway" via
  # ingress-migration.flant.com/gateway-class.
  ingressClassName: nginx
  rules:
    - host: demo-kgateway.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress-kong
  namespace: ingress-migration-mock
spec:
  ingressClassName: kong
  rules:
    - host: demo-kong.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  number: 80
---
# External database — no spec.selector, so its Endpoints are manually managed.
# This is the kind of resource that must be migrated to EndpointSlice.
apiVersion: v1
kind: Service
metadata:
  name: external-db
  namespace: ingress-migration-mock
spec:
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-db
  namespace: ingress-migration-mock
subsets:
  - addresses:
      - ip: 10.0.0.100
      - ip: 10.0.0.101
    ports:
      - name: postgres
        port: 5432
        protocol: TCP
