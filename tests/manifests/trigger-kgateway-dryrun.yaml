# Trigger ConfigMap used by e2e tests (kgateway-dev controller).
# Note: this is NOT an ingress2gateway provider; we still run ingress2gateway with a
# supported provider (ingress-nginx) and override the output GatewayClass via annotation.
apiVersion: v1
kind: ConfigMap
metadata:
  name: migrate-ingress-mock
  namespace: ingress-migration-mock
  labels:
    ingress-migration.flant.com/trigger: "true"
  annotations:
    ingress-migration.flant.com/providers: "ingress-nginx"
    ingress-migration.flant.com/gateway-class: "kgateway"
    ingress-migration.flant.com/dry-run: "true"
    ingress-migration.flant.com/namespace-selector: "env=prod"
    ingress-migration.flant.com/migrate-endpoints: "true"
data:
  placeholder: "e2e"
