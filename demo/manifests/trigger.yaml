# demo/manifests/trigger.yaml
# The shell-operator watches ConfigMaps with this label and runs the migration hook.
# Start with dry-run: true so we can inspect the output before applying.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: migrate-ingress-demo
  namespace: demo-prod
  labels:
    ingress-migration.flant.com/trigger: "true"
  annotations:
    ingress-migration.flant.com/providers: "ingress-nginx"
    ingress-migration.flant.com/dry-run: "true"
    ingress-migration.flant.com/namespace-selector: "env=prod"
    ingress-migration.flant.com/migrate-endpoints: "true"
data:
  note: "Trigger ConfigMap — the operator will patch status fields here after each run."
