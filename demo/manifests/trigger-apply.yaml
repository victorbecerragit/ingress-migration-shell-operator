# demo/manifests/trigger-apply.yaml
# Live-apply trigger: dry-run disabled, gateway class set for this Kind cluster.
# Use this after reviewing the dry-run output from trigger.yaml.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: migrate-ingress-demo
  namespace: demo-prod
  labels:
    ingress-migration.flant.com/trigger: "true"
  annotations:
    ingress-migration.flant.com/providers: "ingress-nginx"
    ingress-migration.flant.com/dry-run: "false"
    ingress-migration.flant.com/namespace-selector: "env=prod"
    ingress-migration.flant.com/migrate-endpoints: "true"
    ingress-migration.flant.com/gateway-class: "cloud-provider-kind"
data:
  note: "Trigger ConfigMap — live apply. Operator will patch status fields here after each run."
