# demo/manifests/ingress.yaml
# NGINX Ingress for the demo app — this is what we're migrating FROM.
# ingress2gateway converts this to a Gateway + HTTPRoute with ingressClass=nginx.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: demo-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: demo.prod.example
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-app
            port:
              number: 80
