# demo/manifests/ingress.yaml
# NGINX Ingress for the demo app — this is what we're migrating FROM.
# We set spec.ingressClassName=nginx so ingress-nginx is the explicit controller.
# ingress2gateway converts this to a Gateway + HTTPRoute and (by default) uses the
# IngressClass name as gatewayClassName.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: demo-prod
spec:
  ingressClassName: nginx
  rules:
  - host: demo.prod.example
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-app
            port:
              number: 80
