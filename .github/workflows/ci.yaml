name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Shellcheck Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          additional_files: 'scripts/lib/common.sh scripts/lib/status.sh scripts/lib/history.sh scripts/lib/provider.sh scripts/lib/nginx_gotchas.sh'
          external_sources: true

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm Chart
        run: helm lint .

      - name: Render Helm Templates
        run: helm template ci . --namespace default > /dev/null

  build-push:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: victorbecerra
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Get version from Helm chart
        id: chart-version
        run: |
          VERSION=$(awk -F': *' '/^version:/{print $2; exit}' Chart.yaml | tr -d '"')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Docker image tag: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: victorbecerra/ingress-migration-shell-operator:${{ steps.chart-version.outputs.version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
