name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm Chart
        run: helm lint .

      - name: Render Helm Templates
        run: helm template ci . --namespace default > /dev/null

  # ── unit tests (bats, no cluster) ──────────────────────────────────────────
  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git tests/.tools/bats-core
          tests/.tools/bats-core/install.sh tests/.tools
          echo "tests/.tools/bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: make test-unit

  # ── golden tests (nginx_gotchas scanner, no cluster) ───────────────────────
  golden-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run golden tests
        run: make test-golden

  # ── e2e matrix (one Kind cluster per provider) ─────────────────────────────
  e2e:
    needs: [lint, unit-tests, golden-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: true
      matrix:
        provider: [nginx, kgateway-dev, apisix, kong]
    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        run: |
          KIND_VERSION=v0.22.0
          curl -fsSL -o ./kind \
            "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
          kind --version

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Run E2E — ${{ matrix.provider }}
        run: make test-e2e PROVIDER=${{ matrix.provider }}

  build-push:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: victorbecerra
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Get version from Helm chart
        id: chart-version
        run: |
          VERSION=$(awk -F': *' '/^version:/{print $2; exit}' Chart.yaml | tr -d '"')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Docker image tag: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: victorbecerra/ingress-migration-shell-operator:${{ steps.chart-version.outputs.version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

  release-chart:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Package Helm chart
        run: |
          mkdir -p .cr-release-packages
          helm package . --destination .cr-release-packages/

      - name: Check if chart release tag already exists
        id: tag-check
        run: |
          VERSION=$(helm show chart .cr-release-packages/*.tgz | awk '/^version:/{print $2}')
          TAG="ingress-migration-shell-operator-${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — skipping chart-releaser"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} not found — will publish"
          fi

      - name: Run chart-releaser
        if: steps.tag-check.outputs.exists == 'false'
        uses: helm/chart-releaser-action@v1.6.0
        with:
          skip_packaging: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
