name: Publish Helm Chart

on:
  push:
    tags:
      - 'v*'   # Trigger on version tags like v0.2.0

permissions:
  contents: write
  issues: write

jobs:
  validate:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.get-version.outputs.version }}
      app-version:   ${{ steps.get-version.outputs.app-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Get chart version
        id: get-version
        run: |
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          APP_VERSION=$(grep '^appVersion:' Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION}"     >> $GITHUB_OUTPUT
          echo "app-version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Chart Version: ${VERSION}"
          echo "🚀 App Version:   ${APP_VERSION}"

      - name: Lint Helm chart
        run: |
          helm lint . -v 2
          echo "✅ Helm chart validation passed"

      - name: Template Helm chart
        run: |
          helm template ingress-migration-shell-operator . > /tmp/manifests.yaml
          echo "✅ Helm chart template rendering successful"
          echo "Generated manifests:"
          head -60 /tmp/manifests.yaml

  request-approval:
    name: Request Approval for Publication
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Create approval issue
        uses: actions/github-script@v7
        with:
          script: |
            const chartVersion = '${{ needs.validate.outputs.chart-version }}';
            const appVersion   = '${{ needs.validate.outputs.app-version }}';
            const tagRef       = '${{ github.ref_name }}';

            const issueBody = `
            ## 🚀 Helm Chart Release Request

            A new release has been validated and is ready to publish.

            ### Chart Metadata
            - **Chart Version:** \`${chartVersion}\`
            - **App Version:**   \`${appVersion}\`
            - **Git Tag:**       \`${tagRef}\`

            ### What will happen when published
            - Helm chart packaged and pushed to the \`gh-pages\` branch
            - GitHub Release created with install instructions
            - \`index.yaml\` updated so users can \`helm repo update\`

            ### Validation Status
            ✅ \`helm lint\` passed
            ✅ \`helm template\` rendered successfully

            ### Install after publish
            \`\`\`bash
            helm repo add ingress-migration https://victorbecerragit.github.io/ingress-migration-shell-operator
            helm install ingress-migration ingress-migration/ingress-migration-shell-operator
            \`\`\`

            ---
            > This issue was created automatically by the **Publish Helm Chart** workflow.
            > The \`publish\` job will run automatically after validation — close this issue once the release is confirmed.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `📦 Helm Chart Release v${chartVersion} — ${tagRef}`,
              body:  issueBody,
              labels: ['release']
            });

  publish:
    name: Publish Helm Chart to gh-pages
    runs-on: ubuntu-latest
    needs: validate
    # Remove the line below to auto-publish on every tag push without manual gate
    if: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Create .deploy directory
        run: mkdir -p .deploy

      - name: Package Helm chart
        run: |
          echo "📦 Packaging Helm chart version ${{ needs.validate.outputs.chart-version }}"
          helm package . --destination .deploy
          echo "✅ Chart packaged successfully"

      - name: Update Helm repo index
        run: |
          echo "📝 Updating Helm repository index"

          # Fetch existing index.yaml from gh-pages to merge with new version
          if git rev-parse --verify origin/gh-pages &>/dev/null; then
            echo "Fetching existing index.yaml to merge releases"
            git show origin/gh-pages:index.yaml > .deploy/index-old.yaml 2>/dev/null || true
          fi

          # Generate new index, merging with existing if available
          if [ -f .deploy/index-old.yaml ]; then
            helm repo index .deploy \
              --url https://victorbecerragit.github.io/ingress-migration-shell-operator \
              --merge .deploy/index-old.yaml
            echo "✅ Index merged with ${{ needs.validate.outputs.chart-version }}"
          else
            helm repo index .deploy \
              --url https://victorbecerragit.github.io/ingress-migration-shell-operator
            echo "✅ Repository index created (first release)"
          fi

          # Clean up merge file
          rm -f .deploy/index-old.yaml
          ls -la .deploy/

      - name: Deploy to gh-pages
        run: |
          echo "🚀 Deploying to gh-pages branch"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save chart artifacts to a temp location (avoids branch-switch conflicts)
          mkdir -p /tmp/chart-deploy
          cp -r .deploy/* /tmp/chart-deploy/

          # Clean working directory
          git clean -fd
          git checkout -- .

          # Fetch and checkout (or create) the gh-pages branch
          git fetch origin gh-pages --depth=1 2>/dev/null || echo "gh-pages branch may not exist yet"

          if git rev-parse --verify origin/gh-pages &>/dev/null; then
            echo "gh-pages branch exists — checking out"
            git checkout gh-pages || git checkout -b gh-pages origin/gh-pages
            git reset --hard origin/gh-pages
          else
            echo "gh-pages branch does not exist — creating orphan branch"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Remove non-chart files but PRESERVE existing .tgz packages
          rm -rf .github .gitignore .dockerignore 2>/dev/null || true

          # Copy new chart artifacts (index.yaml already merged, new .tgz added)
          cp -r /tmp/chart-deploy/* .

          git add .
          git commit -m "Publish Helm chart v${{ needs.validate.outputs.chart-version }}" \
            -m "- Chart Version: ${{ needs.validate.outputs.chart-version }}" \
            -m "- App Version:   ${{ needs.validate.outputs.app-version }}" \
            -m "- Git Tag:       ${{ github.ref_name }}" \
            || echo "No changes to commit"

          git push origin gh-pages --force-with-lease
          echo "✅ Helm chart published to https://victorbecerragit.github.io/ingress-migration-shell-operator"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const releaseBody = `
            ## 📦 Helm Chart v${{ needs.validate.outputs.chart-version }}

            ### Chart Metadata
            - **Chart Version:** \`${{ needs.validate.outputs.chart-version }}\`
            - **App Version:**   \`${{ needs.validate.outputs.app-version }}\`
            - **Git Tag:**       \`${{ github.ref_name }}\`

            ### What's included
            ✅ Automated Ingress → HTTPRoute/Gateway API migration via \`ingress2gateway\`
            ✅ Multi-provider support: ingress-nginx, apisix, kong
            ✅ Dry-run mode (set \`DRY_RUN=true\` in the ConfigMap trigger)
            ✅ Append-only JSONL history log per namespace
            ✅ NGINX preflight warning scanner
            ✅ Idempotent hook — safe to re-run at any time

            ### Installation
            \`\`\`bash
            helm repo add ingress-migration https://victorbecerragit.github.io/ingress-migration-shell-operator
            helm repo update
            helm install ingress-migration ingress-migration/ingress-migration-shell-operator
            \`\`\`

            ### Upgrade
            \`\`\`bash
            helm repo update
            helm upgrade ingress-migration ingress-migration/ingress-migration-shell-operator
            \`\`\`

            ### Documentation
            - [README](https://github.com/victorbecerragit/ingress-migration-shell-operator#readme)
            - [Chart Values](https://github.com/victorbecerragit/ingress-migration-shell-operator/blob/${{ github.ref_name }}/values.yaml)
            `;

            await github.rest.repos.createRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              tag_name:   '${{ github.ref_name }}',
              name:       'Helm Chart v${{ needs.validate.outputs.chart-version }}',
              body:       releaseBody,
              draft:      false,
              prerelease: false
            });
