apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingress-migration
  labels:
    app: ingress-migration
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ingress-migration
  template:
    metadata:
      labels:
        app: ingress-migration
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: shell-operator
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SHELL_OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: hooks
              mountPath: /hooks
            - name: hooks-lib
              mountPath: /usr/local/lib/hooks
      volumes:
        - name: hooks
          configMap:
            name: {{ .Release.Name }}-ingress-migration-scripts
            defaultMode: 0755
            items:
              - key: migrate.sh
                path: migrate.sh
              - key: validate.sh
                path: validate.sh
              - key: rollback.sh
                path: rollback.sh
        - name: hooks-lib
          configMap:
            name: {{ .Release.Name }}-ingress-migration-scripts
            defaultMode: 0644
            items:
              - key: common.sh
                path: common.sh
              - key: status.sh
                path: status.sh
              - key: history.sh
                path: history.sh
              - key: provider.sh
                path: provider.sh
              - key: nginx_gotchas.sh
                path: nginx_gotchas.sh
